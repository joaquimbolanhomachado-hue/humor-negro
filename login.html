<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: arial, sans-serif;
            background-color: gray;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        form {
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 30px rgba(0, 0, 0,0.1);
            width: 300px;
            background-color: rgba(255, 255, 255, 0.1); 
        }

        h1 {
            color: white;
            text-transform: capitalize;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button{
            width: 30%;
            padding: 10px;
            background-color: white;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: white;
        }

        p {
            margin-top: 15px;
        }

        a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }

        

        .imagem-login  {
    background-image: url(FundoLogin.png);
    position: fixed;
    margin: 0;
    padding: 0;
    top: 0;
    left: 150px;
    right: 0;
    z-index: -1;
    width: 0;
    height: auto;
    
}



    </style>
</head>
<body>
    <h1>login</h1>
    <form action="login.html" method="post">

        <div>
            <label for="usuário">usuário:</label><br>
            <input type="text" id="usuário" name="usuário" required>
        </div>

        <br>

        <div>
            <label for="senha">senha:</label><br>
            <input type="password" id="senha" name="senha" required>
        </div>

        <br>

        <div>
            <button type="submit">Logar</button>
        </div>

        <div class="imagem-login">
            <img src="imagem/FundoLogin.png" width="2100px" style="position: relative; left: -200px;" height="1000px" alt="imagem-login">
            
        </div>

    
    </form>

    <p>
        <a href="#">esqueceu a senha?</a>
    </p>


</body>
</html>
